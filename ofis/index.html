<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="ofis_style.css"> <title>Ofis Sahnesi</title>
</head>

<body class="ofis-theme"> <div class="game-container">
        
        <button class="back-btn-static" onclick="goBackToMap()">🔙 VAZGEÇ</button>

        <div id="office-preparation" class="scene active">
            <h2 id="office-welcome">Hoş geldin...</h2>
            
            <div class="preparation-zones">
                <div class="prep-card">
                    <h3>🚀 Teknoloji</h3>
                    <p>Odak Noktanız:</p>
                    <input type="text" id="prep-tech" placeholder="Örn: Yapay Zeka">
                </div>

                <div class="prep-card">
                    <h3>💡 Çözüm</h3>
                    <p>Çözülecek İhtiyaç:</p>
                    <input type="text" id="prep-need" placeholder="Örn: Hızlı Ulaşım">
                </div>

                <div class="prep-card">
                    <h3>🎨 Tasarım</h3>
                    <p>Tasarım Tarzı:</p>
                    <select id="prep-style">
                        <option value="Modern">Modern</option>
                        <option value="Klasik">Klasik</option>
                        <option value="Futuristik">Futuristik</option>
                    </select>
                </div>
            </div>

            <button class="btn primary" style="margin-top: 30px;" onclick="startPresentation()">SUNUMA BAŞLA 🚀</button>
        </div>

        <div id="office-presentation" class="scene">
            <div class="presentation-layout">
                <div class="juror-area">
                    <div class="juror-avatar">👨‍💼</div>
                    <p><strong>Başkanın Değerlendirmesi</strong></p>
                </div>

                <div class="dialogue-box" id="presentation-text">
                    Yükleniyor...
                </div>

                <button id="next-slide-btn" class="btn primary" onclick="nextSlide()">SONRAKİ ➔</button>
            </div>
        </div>

    </div>
    <script src="ofis_script.js"></script>
</body>
