<body>
    <div class="game-container">
        
        <button class="back-btn-static" style="top:20px; left:20px; position:absolute; z-index:100;" onclick="goBackToMap()">🔙 VAZGEÇ</button>

        <div id="office-preparation" class="scene active">
            <h2 id="office-welcome">Hoş geldin...</h2>
            <div class="content-wrapper" style="background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px;">
                <div class="input-group">
                    <p>Teknoloji Odak Noktanız:</p>
                    <input type="text" id="prep-tech" placeholder="Örn: Yapay Zeka">
                    
                    <p>Çözülecek İhtiyaç:</p>
                    <input type="text" id="prep-need" placeholder="Örn: Hızlı Ulaşım">
                    
                    <p>Tasarım Tarzı:</p>
                    <select id="prep-style" class="btn secondary" style="width: 100%; margin: 10px 0;">
                        <option value="Modern">Modern</option>
                        <option value="Klasik">Klasik</option>
                        <option value="Futuristik">Futuristik</option>
                    </select>
                </div>
                <button class="btn primary" onclick="startPresentation()">SUNUMA BAŞLA 🚀</button>
            </div>
        </div>

        <div id="office-presentation" class="scene">
            <div class="presentation-board">
                <div id="presentation-text">Yükleniyor...</div>
                <button id="next-slide-btn" class="btn primary" onclick="nextSlide()">SONRAKİ ➔</button>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
