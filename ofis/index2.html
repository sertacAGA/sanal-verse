<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanal Verse - Ofis Sunumu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="office-container">
        
        <img src="../images/Ofis_bg.jpg" alt="Ofis" class="bg-image">

        <button class="back-btn" onclick="window.location.href='../index.html'">🔙 HARİTAYA DÖN</button>

        <div class="room-title-badge">YATIRIMCI SUNUM ODASI</div>

        <div class="presentation-area">
            
            <div class="projection-screen">
                <div class="screen-content">
                    <h3>PROJE: HİBRİT GÖZLEM ARACI</h3>
                    <img src="../images/Proje_taslak.png" alt="Proje Taslağı" class="project-drawing">
                    <p class="project-status">DURUM: Prototip Aşaması</p>
                </div>
            </div>

            <div class="control-panel">
                <div class="panel-header">
                    <h2>SUNUM AKIŞI</h2>
                </div>
                
                <div class="panel-body">
                    <div class="step active">1. Proje Vizyonu</div>
                    <div class="step">2. Teknik Özellikler</div>
                    <div class="step">3. Bütçe ve Zamanlama</div>
                    <div class="step">4. Soru-Cevap</div>
                </div>

                <div class="panel-stats">
                    <div class="stat-item">
                        <span>Yatırımcı İlgisi</span>
                        <div class="progress-bar"><div class="progress" style="width: 75%;"></div></div>
                    </div>
                    <div class="stat-item">
                        <span>Kalan Enerji</span>
                        <div class="progress-bar energy"><div class="progress" style="width: 40%;"></div></div>
                    </div>
                </div>

                <div class="panel-buttons">
                    <button class="btn primary">SONRAKİ SLAYT</button>
                    <button class="btn secondary">YATIRIMCIYI İKNA ET</button>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
