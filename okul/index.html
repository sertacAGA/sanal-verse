<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanal Okul V5 - Final</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <script src="icerik.js"></script>

    <style>
        /* --- GENEL STİLLER --- */
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; user-select: none; touch-action: none; }
        
        /* Arayüz Katmanı */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: center; align-items: center; z-index: 10; }
        
        /* Akıllı Tahta */
        #smart-board { 
            width: 95%; height: 92%; 
            background: #f4f4f4; 
            border: 10px solid #2c3e50; 
            border-radius: 10px; 
            pointer-events: auto; 
            display: flex; 
            flex-direction: row; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            overflow: hidden;
        }
        
        /* --- SOL MENÜ --- */
        #sidebar { width: 280px; background: #34495e; color: white; display: flex; flex-direction: column; border-right: 2px solid #2c3e50; }
        #user-info { padding: 20px; background: #2c3e50; text-align: center; border-bottom: 1px solid #444; }
        #score-display { font-size: 1.4em; font-weight: bold; color: #f1c40f; margin-top: 5px; }
        
        #menu-container { flex: 1; overflow-y: auto; }
        
        .main-subject { 
            width: 100%; padding: 15px; background: #2c3e50; color: white; 
            border: none; text-align: left; font-weight: bold; border-bottom: 1px solid #1a252f; 
            cursor: pointer; transition: 0.2s; font-size: 1em;
        }
        .main-subject:hover { background: #1abc9c; }
        
        .sub-topic { 
            width: 100%; padding: 12px 20px; border: none; background: #ecf0f1; 
            text-align: left; border-bottom: 1px solid #bdc3c7; cursor: pointer; 
            font-size: 0.9em; color: #333; display: flex; justify-content: space-between;
        }
        .sub-topic:hover { background: #dfe6e9; }
        .sub-topic.active-lesson { background: #3498db; color: white; }
        .sub-topic.completed-badge { color: #27ae60; font-weight: bold; }

        /* --- İÇERİK ALANI --- */
        #content-area { flex: 1; padding: 20px; display: flex; flex-direction: column; background: white; position: relative; }
        
        #lesson-header { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        #lesson-title { margin: 0; color: #2c3e50; font-size: 1.6em; }
        
        /* İlerleme Çubuğu */
        #progress-bar { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .p-step { padding: 4px 10px; background: #eee; border-radius: 10px; font-size: 0.8em; color: #aaa; }
        .p-step.active { background: #3498db; color: white; }

        /* Dinamik İçerik */
        #dynamic-content { flex: 1; overflow-y: auto; font-size: 1.1em; line-height: 1.6; padding-right: 10px; }
        
        .section-note { font-size: 0.9em; color: #7f8c8d; margin-bottom: 10px; display: block; font-style: italic; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        
        /* Görseller ve Video */
        .gallery { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .gallery img { height: 250px; border-radius: 5px; border: 1px solid #ddd; object-fit: cover; }
        iframe { width: 100%; height: 300px; border: none; border-radius: 8px; background: #000; }
        
        /* Örnek Kutusu */
        .ex-box { background: #e8f8f5; border-left: 4px solid #1abc9c; padding: 10px; margin: 5px 0; font-size: 0.95em; }

        /* Çizim Alanı */
        #drawing-canvas { border: 2px dashed #7f8c8d; background: #fff; display: block; margin: 0 auto; max-width: 100%; cursor: crosshair; }
        
        /* Quiz */
        .quiz-box { margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 5px; }
        .q-btn { display: block; width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #bdc3c7; background: white; text-align: left; cursor: pointer; border-radius: 4px; }
        .q-btn:hover { background: #ecf0f1; }
        .q-btn.correct { background: #d5f5e3; border-color: #2ecc71; }
        .q-btn.wrong { background: #fadbd8; border-color: #e74c3c; }

        /* Butonlar */
        #controls { margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; display: flex; justify-content: space-between; }
        .btn { padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; transition: 0.3s; }
        .btn-next { background: #2980b9; color: white; }
        .btn-prev { background: #95a5a6; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-finish { background: #27ae60; color: white; }

    </style>
</head>
<body>

    <a-scene embedded vr-mode-ui="enabled: false">
        <a-entity light="type: ambient; color: #CCC"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 0.5" position="-1 1 0"></a-entity>
        
        <a-box position="0 2.5 -5" width="14" height="6" depth="0.1" color="#ecf0f1"></a-box> <a-plane position="0 0 -2" rotation="-90 0 0" width="14" height="14" color="#795548"></a-plane> <a-box position="0 0.5 -3" width="2.5" height="1" depth="1" color="#5D4037"></a-box> <a-entity position="0 1.6 1.5"><a-camera look-controls="enabled: false"></a-camera></a-entity>
    </a-scene>

    <div id="ui-layer">
        <div id="smart-board">
            
            <div id="sidebar">
                <div id="user-info">
                    <div style="font-size:0.9em; opacity:0.8;">Toplam Puan</div>
                    <div id="score-display">0</div>
                </div>
                <div id="menu-container">
                    </div>
            </div>

            <div id="content-area">
                <div id="lesson-header">
                    <h2 id="lesson-title">Ders Seçimi</h2>
                    <div id="progress-bar">
                        <span class="p-step" id="st-0">Konu</span>
                        <span class="p-step" id="st-1">Görsel</span>
                        <span class="p-step" id="st-2">Video</span>
                        <span class="p-step" id="st-3">Örnek</span>
                        <span class="p-step" id="st-4">Etkinlik</span>
                        <span class="p-step" id="st-5">Sınav</span>
                    </div>
                </div>

                <div id="dynamic-content">
                    <div style="text-align:center; margin-top:50px; color:#7f8c8d;">
                        <h3>Sanal Sınıfa Hoşgeldiniz!</h3>
                        <p>Eğitime başlamak için sol menüden bir ders seçiniz.</p>
                    </div>
                </div>

                <div id="controls">
                    <button class="btn btn-prev" id="btn-prev" onclick="changeStep(-1)" disabled>Geri</button>
                    <button class="btn btn-next" id="btn-next" onclick="changeStep(1)" disabled>İleri</button>
                </div>
            </div>

        </div>
    </div>

    <script>

        // Veriler icerik.js'den geliyor.
    const data = (typeof curriculumData !== 'undefined') ? curriculumData : [];

    // --- DURUM DEĞİŞKENLERİ ---
    let userScore = parseInt(localStorage.getItem('v5_score')) || 0;
    
    // Tamamlanan dersleri artık sadece ID olarak değil, aldıkları puanla obje olarak tutalım
    // Örnek yapı: { "mat1": 75, "rob1": 100 }
    let completedLessons = JSON.parse(localStorage.getItem('v5_completed_scores')) || {}; 
    
    let currentLesson = null;
    let currentStep = 0;
    let quizCorrectCount = 0; // YENİ: Doğru cevap sayacı
    
    let synth = window.speechSynthesis;
    let drawCtx = null;
    let isDrawing = false;

    // --- BAŞLANGIÇ ---
    window.onload = () => {
        if(data.length === 0) {
            alert("UYARI: icerik.js dosyası bulunamadı! Aynı klasörde olduğundan emin olun.");
        }
        updateScoreUI();
        renderMenu();
    };

    function updateScoreUI() {
        document.getElementById('score-display').innerText = userScore + " Puan";
    }

    // --- MENÜ SİSTEMİ ---
    function renderMenu() {
        const container = document.getElementById('menu-container');
        container.innerHTML = "";

        data.forEach(subject => {
            // Ana Başlık
            let btn = document.createElement('button');
            btn.className = 'main-subject';
            btn.innerText = subject.subject;
            btn.onclick = function() {
                let panel = this.nextElementSibling;
                panel.style.display = (panel.style.display === 'none') ? 'block' : 'none';
            };
            container.appendChild(btn);

            // Alt Başlıklar
            let panel = document.createElement('div');
            panel.style.display = 'none';
            
            subject.lessons.forEach(lesson => {
                let subBtn = document.createElement('button');
                subBtn.className = 'sub-topic';
                
                // Tamamlanma kontrolü (ID'si listede var mı?)
                let lessonScore = completedLessons[lesson.id]; 
                let isDone = (lessonScore !== undefined);
                
                // Menüde alınan puanı göster
                let statusText = isDone ? `<span class="completed-badge">✓ (${lessonScore} Puan)</span>` : '';
                
                subBtn.innerHTML = `<span>${lesson.title}</span> ${statusText}`;
                subBtn.onclick = () => startLesson(lesson, subBtn);
                panel.appendChild(subBtn);
            });
            container.appendChild(panel);
        });
    }

    // --- DERS BAŞLATMA ---
    function startLesson(lesson, btn) {
        document.querySelectorAll('.sub-topic').forEach(b => b.classList.remove('active-lesson'));
        btn.classList.add('active-lesson');

        currentLesson = lesson;
        currentStep = 0;
        quizCorrectCount = 0; // YENİ: Her ders başında sayacı sıfırla
        
        renderContent();
    }

    // --- İLERİ / GERİ ---
    function changeStep(direction) {
        currentStep += direction;
        renderContent();
    }

    // --- İÇERİK GÖSTERİMİ ---
    function renderContent() {
        const contentDiv = document.getElementById('dynamic-content');
        document.getElementById('lesson-title').innerText = currentLesson.title;

        // Adım Göstergeleri
        for(let i=0; i<=5; i++) {
            let el = document.getElementById(`st-${i}`);
            if(i === currentStep) el.classList.add('active');
            else el.classList.remove('active');
        }

        let prevBtn = document.getElementById('btn-prev');
        let nextBtn = document.getElementById('btn-next');
        prevBtn.disabled = (currentStep === 0);

        // SON ADIM KONTROLÜ
        if(currentStep === 5) {
            // Eğer ders daha önce yapıldıysa
            if(completedLessons[currentLesson.id] !== undefined) {
                nextBtn.innerText = "Menüye Dön";
                nextBtn.className = "btn btn-prev";
                nextBtn.disabled = false;
                nextBtn.onclick = () => {
                    contentDiv.innerHTML = "<div style='text-align:center; margin-top:50px;'><h3>Ders Tekrarlandı.</h3><p>Menüden başka ders seçebilirsiniz.</p></div>";
                    nextBtn.disabled = true;
                    prevBtn.disabled = true;
                };
            } else {
                // İlk defa yapılıyorsa
                nextBtn.innerText = "Sınavı Bitir ve Puanla";
                nextBtn.className = "btn btn-finish";
                nextBtn.disabled = false;
                nextBtn.onclick = finishLessonWithScore; // YENİ FONKSİYON
            }
        } else {
            nextBtn.innerText = "İleri";
            nextBtn.className = "btn btn-next";
            nextBtn.disabled = false;
            nextBtn.onclick = () => changeStep(1);
        }

        synth.cancel();

        switch(currentStep) {
            case 0: // METİN
                contentDiv.innerHTML = `<span class="section-note">Ders Notları:</span><div style="padding:10px; font-size:1.2em;">${currentLesson.content.text}</div>`;
                try { let u = new SpeechSynthesisUtterance(currentLesson.content.text); u.lang = 'tr-TR'; synth.speak(u); } catch(e){}
                break;
            case 1: // RESİM
                let imgs = currentLesson.content.images || [];
                let imgHTML = `<span class="section-note">Görseller:</span><div class="gallery">`;
                imgs.forEach(src => { imgHTML += `<img src="${src}" onerror="this.src='https://placehold.co/600x400?text=Resim+Yok'">`; });
                imgHTML += "</div>";
                contentDiv.innerHTML = imgHTML;
                break;
            case 2: // VİDEO
                let vUrl = currentLesson.content.video;
                contentDiv.innerHTML = `<span class="section-note">Video:</span>` + (vUrl && vUrl.length > 5 ? `<iframe src="${vUrl}" allowfullscreen></iframe>` : `<p>Video yok.</p>`);
                break;
            case 3: // ÖRNEK
                let exs = currentLesson.content.examples || [];
                let exHtml = `<span class="section-note">Örnekler:</span>`;
                exs.forEach(ex => { exHtml += `<div class="ex-box">${ex}</div>`; });
                contentDiv.innerHTML = exHtml;
                break;
            case 4: // ETKİNLİK
                contentDiv.innerHTML = `<span class="section-note">Etkinlik:</span><p><strong>${currentLesson.content.activityText}</strong></p><canvas id="drawing-canvas" width="600" height="300"></canvas><div style="text-align:center;"><button class="btn btn-prev" onclick="clearCanvas()">Temizle</button></div>`;
                setTimeout(setupCanvas, 100);
                break;
            case 5: // SINAV
                let qs = currentLesson.content.quiz || [];
                let qHtml = `<span class="section-note">Değerlendirme Sınavı (${qs.length} Soru):</span>`;
                if(qs.length > 0) {
                    qs.forEach((q, i) => {
                        qHtml += `<div class="quiz-box"><p><strong>${i+1}. ${q.q}</strong></p>`;
                        q.opts.forEach((opt, idx) => {
                            // YENİ: checkAnswer fonksiyonuna buton referansı gönderiyoruz
                            qHtml += `<button class="q-btn" onclick="checkAnswer(this, ${idx}, ${q.ans})">${opt}</button>`;
                        });
                        qHtml += `</div>`;
                    });
                } else { qHtml += "<p>Sınav sorusu yok. Tam puan alacaksınız.</p>"; }
                contentDiv.innerHTML = qHtml;
                break;
        }
    }

    // --- PUAN HESAPLAMA VE BİTİRME ---
    function finishLessonWithScore() {
        if(completedLessons[currentLesson.id] !== undefined) return;

        let totalQuestions = currentLesson.content.quiz.length;
        let maxPoints = currentLesson.points; // Genelde 100
        let earnedPoints = 0;

        if(totalQuestions > 0) {
            // Puan Hesabı: (Doğru Sayısı / Toplam Soru) * Maksimum Puan
            earnedPoints = Math.round((quizCorrectCount / totalQuestions) * maxPoints);
        } else {
            // Eğer hiç soru yoksa ve ders bittiyse tam puan ver
            earnedPoints = maxPoints;
        }

        // Global Puanı Güncelle
        userScore += earnedPoints;
        
        // Dersi "tamamlananlar" listesine puanıyla birlikte kaydet
        // completedLessons objesi şöyle olacak: { "mat1": 80, "fen1": 100 }
        completedLessons[currentLesson.id] = earnedPoints;

        // Kayıt
        localStorage.setItem('v5_score', userScore);
        localStorage.setItem('v5_completed_scores', JSON.stringify(completedLessons));

        updateScoreUI();
        renderMenu(); // Menüdeki tik işaretini ve puanı güncelle

        let msg = (totalQuestions > 0) 
            ? `Tebrikler!\n${totalQuestions} sorudan ${quizCorrectCount} tanesini bildin.\nKazanılan Puan: ${earnedPoints}`
            : `Ders Tamamlandı!\nKazanılan Puan: ${earnedPoints}`;

        alert(msg);

        // Ekranı Temizle
        document.getElementById('dynamic-content').innerHTML = `<div style='text-align:center; margin-top:50px;'><h3>${earnedPoints} Puan Kazanıldı!</h3><p>Sol menüden yeni ders seçebilirsiniz.</p></div>`;
        document.getElementById('btn-next').disabled = true;
        document.getElementById('btn-prev').disabled = true;
    }

    // --- QUIZ CEVAP KONTROLÜ (SAYAÇLI) ---
    window.checkAnswer = function(btn, sel, ans) {
        // O sorudaki tüm şıkları kilitle (Sadece 1 hakkı olsun)
        let parent = btn.parentElement;
        let all = parent.querySelectorAll('.q-btn');
        let alreadyAnswered = false;
        
        // Daha önce cevap verilmiş mi kontrolü (Butonlardan biri disabled ise verilmiştir)
        all.forEach(b => { if(b.disabled) alreadyAnswered = true; });
        if(alreadyAnswered) return; 

        // Şıkları kilitle
        all.forEach(b => b.disabled = true);
        
        if(sel === ans) {
            btn.classList.add('correct');
            quizCorrectCount++; // YENİ: Doğru cevabı say
        } else {
            btn.classList.add('wrong');
            // Kullanıcıya doğru cevabı da gösterebiliriz (Opsiyonel)
            // all[ans].classList.add('correct'); 
        }
    }

    // --- CANVAS ---
    function setupCanvas() {
        const cvs = document.getElementById('drawing-canvas');
        if(!cvs) return;
        drawCtx = cvs.getContext('2d');
        drawCtx.lineWidth=3; drawCtx.lineCap="round"; drawCtx.strokeStyle="#333";
        
        cvs.onmousedown=(e)=>{isDrawing=true;draw(e.offsetX,e.offsetY);};
        cvs.onmouseup=()=>{isDrawing=false;drawCtx.beginPath();};
        cvs.onmousemove=(e)=>{if(isDrawing)draw(e.offsetX,e.offsetY);};
        
        cvs.addEventListener('touchstart',(e)=>{e.preventDefault();let r=cvs.getBoundingClientRect();isDrawing=true;draw(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);},{passive:false});
        cvs.addEventListener('touchmove',(e)=>{e.preventDefault();if(isDrawing){let r=cvs.getBoundingClientRect();draw(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);}},{passive:false});
        cvs.addEventListener('touchend',()=>{isDrawing=false;drawCtx.beginPath();});
    }
    function draw(x,y){drawCtx.lineTo(x,y);drawCtx.stroke();drawCtx.beginPath();drawCtx.moveTo(x,y);}
    function clearCanvas(){const c=document.getElementById('drawing-canvas');c.getContext('2d').clearRect(0,0,c.width,c.height);}

    </script>
</body>
</html>
