<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanal Okul V2.5</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="icerik.js"></script>

    <style>
        /* --- V2.5 OKUL STİLLERİ --- */
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; user-select: none; }
        
        /* Arka Plan 3D Sahne */
        a-scene { z-index: 1; }

        /* Arayüz Katmanı */
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; display: flex; justify-content: center; align-items: center; z-index: 10; 
        }
        
        /* Akıllı Tahta Arka Planı */
        #smart-board { 
            width: 95%; height: 88%; 
            background: #ffffff; 
            border: 12px solid #2c3e50; 
            border-radius: 20px; 
            pointer-events: auto; 
            display: flex; 
            flex-direction: row; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* --- SOL MENÜ (Sidebar) --- */
        #sidebar { width: 300px; background: #2c3e50; color: white; display: flex; flex-direction: column; }
        
        #user-info { 
            padding: 25px; background: #1a252f; text-align: center; border-bottom: 2px solid #34495e; 
        }
        
        #player-name-display { font-size: 1.1em; font-weight: bold; color: #ffffff; margin-bottom: 5px; }
        #score-display { font-size: 1.5em; font-weight: 900; color: #f1c40f; }
        
        #menu-container { flex: 1; overflow-y: auto; background: #34495e; }
        
        .main-subject { 
            width: 100%; padding: 18px; background: #2c3e50; color: white; 
            border: none; text-align: left; font-weight: bold; border-bottom: 1px solid #1a252f; 
            cursor: pointer; transition: 0.2s; font-size: 1em;
        }
        .main-subject:hover { background: #1abc9c; }
        
        .sub-topic { 
            width: 100%; padding: 14px 20px; border: none; background: #ecf0f1; 
            text-align: left; border-bottom: 1px solid #bdc3c7; cursor: pointer; 
            font-size: 0.9em; color: #333; display: flex; justify-content: space-between; align-items: center;
        }
        .sub-topic:hover { background: #dfe6e9; }
        .sub-topic.active-lesson { background: #3498db; color: white; }
        .completed-badge { color: #27ae60; font-size: 1.2em; }

        /* --- İÇERİK ALANI --- */
        #content-area { flex: 1; padding: 30px; display: flex; flex-direction: column; background: white; }
        
        #lesson-header { border-bottom: 3px solid #f1f2f6; padding-bottom: 15px; margin-bottom: 20px; }
        #lesson-title { margin: 0; color: #2c3e50; font-size: 1.8em; font-weight: 800; }
        
        /* İlerleme Çubuğu */
        #progress-bar { display: flex; gap: 8px; margin-top: 15px; }
        .p-step { padding: 6px 14px; background: #f1f2f6; border-radius: 20px; font-size: 0.75em; color: #95a5a6; font-weight: bold; }
        .p-step.active { background: #3498db; color: white; }

        #dynamic-content { flex: 1; overflow-y: auto; color: #2f3542; line-height: 1.7; }
        
        /* Butonlar */
        #controls { margin-top: 20px; padding-top: 20px; border-top: 2px solid #f1f2f6; display: flex; justify-content: space-between; }
        .btn { padding: 12px 30px; border: none; border-radius: 12px; cursor: pointer; font-size: 1em; font-weight: bold; transition: 0.3s; }
        .btn-next { background: #2980b9; color: white; box-shadow: 0 4px 0 #1c5982; }
        .btn-next:active { transform: translateY(4px); box-shadow: none; }
        .btn-prev { background: #95a5a6; color: white; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-finish { background: #27ae60; color: white; box-shadow: 0 4px 0 #1e8449; }

        /* V2.5 Geri Dön Butonu */
        .back-btn-static {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0,0,0,0.8); color: white; border: 2px solid white;
            padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold;
            pointer-events: auto;
        }

        /* Çizim ve Quiz */
        #drawing-canvas { border: 3px dashed #dfe4ea; border-radius: 15px; margin: 20px 0; background: #f8f9fa; }
        .quiz-box { background: #f1f2f6; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .q-btn { 
            display: block; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #dfe4ea; 
            background: white; text-align: left; cursor: pointer; border-radius: 10px; font-weight: 500;
        }
        .q-btn.correct { background: #2ecc71; color: white; border-color: #27ae60; }
        .q-btn.wrong { background: #e74c3c; color: white; border-color: #c0392b; }

        /* Her türlü uyarı veya izin kutusunu en öne taşır */
        .tts-permission-dialog, .modal, #notification-area {
            position: fixed;
            z-index: 9999 !important;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <button class="back-btn-static" onclick="window.location.href='../index.html'">🔙 HARİTAYA DÖN</button>

    <a-scene embedded vr-mode-ui="enabled: false">
        <a-entity light="type: ambient; color: #CCC"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 0.5" position="-1 1 0"></a-entity>
        <a-box position="0 2.5 -5" width="14" height="6" depth="0.1" color="#34495e"></a-box> 
        <a-plane position="0 0 -2" rotation="-90 0 0" width="14" height="14" color="#7f8c8d"></a-plane> 
        <a-entity position="0 1.6 1.5"><a-camera look-controls="enabled: false"></a-camera></a-entity>
    </a-scene>

    <div id="ui-layer">
        <div id="smart-board">
            
            <div id="sidebar">
                <div id="user-info">
                    <div id="player-name-display">Oyuncu</div>
                    <div id="score-display">0 Puan</div>
                </div>
                <div id="menu-container">
                    </div>
            </div>

            <div id="content-area">
                <div id="lesson-header">
                    <h2 id="lesson-title">Eğitime Başla</h2>
                    <div id="progress-bar">
                        <span class="p-step" id="st-0">BİLGİ</span>
                        <span class="p-step" id="st-1">GÖRSEL</span>
                        <span class="p-step" id="st-2">VİDEO</span>
                        <span class="p-step" id="st-3">ÖRNEK</span>
                        <span class="p-step" id="st-4">UYGULAMA</span>
                        <span class="p-step" id="st-5">SINAV</span>
                    </div>
                </div>

                <div id="dynamic-content">
                    <div style="text-align:center; margin-top:80px; color:#95a5a6;">
                        <div style="font-size: 4em; margin-bottom: 10px;">🎓</div>
                        <h3>Sanal Sınıfına Hoş Geldin!</h3>
                        <p>Lütfen soldaki menüden öğrenmek istediğin dersi seç.</p>
                    </div>
                </div>

                <div id="controls">
                    <button class="btn btn-prev" id="btn-prev" onclick="changeStep(-1)" disabled>Geri</button>
                    <button class="btn btn-next" id="btn-next" onclick="changeStep(1)" disabled>İleri</button>
                </div>
            </div>

        </div>
    </div>

    <script>
// --- DİNAMİK MENÜ OLUŞTURUCU ---
const menuContainer = document.getElementById('menu-container');
let currentLesson = null;
let currentStep = 0;
let userScore = parseInt(localStorage.getItem('userScore')) || 0;

// Puanı ekranda güncelle
document.getElementById('score-display').innerText = userScore + " Puan";

function buildMenu() {
    menuContainer.innerHTML = ""; // Menüyü temizle
    
    curriculumData.forEach(item => {
        // Ana Ders Başlığı (Matematik, Edebiyat vb.)
        const subjectBtn = document.createElement('button');
        subjectBtn.className = 'main-subject';
        subjectBtn.innerText = "📘 " + item.subject;
        menuContainer.appendChild(subjectBtn);

        // Alt Konular (Geometri, Üslü Sayılar vb.)
        item.lessons.forEach(lesson => {
            const topicBtn = document.createElement('button');
            topicBtn.className = 'sub-topic';
            topicBtn.innerHTML = `<span>${lesson.title}</span> <span class="points">+${lesson.points}p</span>`;
            
            topicBtn.onclick = () => loadLesson(lesson);
            menuContainer.appendChild(topicBtn);
        });
    });
}

// --- DERS YÜKLEME MANTIĞI ---
function loadLesson(lesson) {
    currentLesson = lesson;
    currentStep = 0;
    document.getElementById('lesson-title').innerText = lesson.title;
    renderStep();
    
    // Aktif dersi görsel olarak işaretle
    document.querySelectorAll('.sub-topic').forEach(btn => btn.classList.remove('active-lesson'));
    event.currentTarget.classList.add('active-lesson');
}

function renderStep() {
    const content = document.getElementById('dynamic-content');
    const steps = ["st-0", "st-1", "st-2", "st-3", "st-4", "st-5"];
    
    // Progress bar güncelle
    steps.forEach((id, index) => {
        document.getElementById(id).className = (index === currentStep) ? 'p-step active' : 'p-step';
    });

    // İçeriği temizle ve aşamaya göre doldur
    content.innerHTML = "";
    const lessonData = currentLesson.content;

    switch(currentStep) {
        case 0: content.innerHTML = `<p>${lessonData.text}</p>`; break;
        case 1: content.innerHTML = `<img src="${lessonData.images[0]}" style="width:100%; border-radius:15px;">`; break;
        case 2: content.innerHTML = `<iframe width="100%" height="300" src="${lessonData.video}" frameborder="0" allowfullscreen></iframe>`; break;
        case 3: content.innerHTML = `<ul>${lessonData.examples.map(e => `<li>${e}</li>`).join('')}</ul>`; break;
        case 4: content.innerHTML = `<p><strong>Görev:</strong> ${lessonData.activityText}</p><div id="drawing-canvas" style="height:200px; display:flex; align-items:center; justify-content:center; color:#bdc3c7;">[Çizim Alanı Aktif]</div>`; break;
        case 5: renderQuiz(lessonData.quiz); break;

        // renderStep() içinde içeriği bastıktan hemen sonra eklenebilir
        const speakBtn = document.createElement('button');
        speakBtn.innerText = "🔊 Sesli Dinle";
        speakBtn.className = "btn"; // Mevcut stilini kullanır
        speakBtn.onclick = () => {
            const synth = window.speechSynthesis;
            const utterThis = new SpeechSynthesisUtterance(lessonData.text);
            utterThis.lang = 'tr-TR';
            synth.speak(utterThis);
        };
        content.appendChild(speakBtn);
    }

    // Butonları güncelle
    document.getElementById('btn-prev').disabled = (currentStep === 0);
    document.getElementById('btn-next').disabled = false;
    document.getElementById('btn-next').innerText = (currentStep === 5) ? "BİTİR" : "İLERİ";
}

function changeStep(dir) {
    if (currentStep === 5 && dir === 1) {
        finishLesson();
        return;
    }
    currentStep += dir;
    renderStep();
}

function renderQuiz(quizData) {
    const content = document.getElementById('dynamic-content');
    content.innerHTML = `<h3>Kısa Sınav</h3>`;
    quizData.forEach((q, idx) => {
        const qBox = document.createElement('div');
        qBox.className = 'quiz-box';
        qBox.innerHTML = `<p>${q.q}</p>`;
        q.opts.forEach((opt, optIdx) => {
            const btn = document.createElement('button');
            btn.className = 'q-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if(optIdx === q.ans) btn.classList.add('correct');
                else btn.classList.add('wrong');
            };
            qBox.appendChild(btn);
        });
        content.appendChild(qBox);
    });
}

function finishLesson() {
    userScore += currentLesson.points;
    localStorage.setItem('userScore', userScore);
    document.getElementById('score-display').innerText = userScore + " Puan";
    alert("Tebrikler! Dersi tamamladın ve puan kazandın.");
    location.reload(); // Veya haritaya dön
}

// Uygulamayı başlat
buildMenu();
    </script>
<script src="quest-system.js"></script>
<script src="icerik.js"></script>
</body>
</html>
