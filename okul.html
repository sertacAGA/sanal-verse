<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanal Okul V3 - iPad Uyumlu</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <script src="icerik.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; touch-action: none; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: center; align-items: center; z-index: 10; }
        #smart-board { width: 90%; height: 90%; background: #f9f9f9; border: 12px solid #333; border-radius: 8px; pointer-events: auto; display: flex; flex-direction: row; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        /* Sol Menü */
        #sidebar { width: 260px; background: #2c3e50; color: white; display: flex; flex-direction: column; overflow: hidden; }
        #user-info { padding: 15px; background: #1a252f; text-align: center; border-bottom: 1px solid #444; }
        #menu-container { flex: 1; overflow-y: auto; }
        
        .main-subject { width: 100%; padding: 15px; background: #34495e; color: white; border: none; text-align: left; font-weight: bold; border-bottom: 1px solid #2c3e50; cursor: pointer; }
        .sub-topic { width: 100%; padding: 12px 20px; border: none; background: #ecf0f1; text-align: left; border-bottom: 1px solid #bdc3c7; cursor: pointer; font-size: 0.9em; color: #333; }
        .sub-topic.completed::after { content: ' ★'; color: orange; }
        .sub-topic.active-lesson { background: #3498db; color: white; }

        /* İçerik Alanı */
        #content-area { flex: 1; padding: 20px; display: flex; flex-direction: column; background: white; position: relative; overflow: hidden; }
        #lesson-header h2 { margin: 0 0 10px 0; color: #2c3e50; }
        
        /* İlerleme Çubuğu */
        #progress-steps { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; }
        .step-badge { padding: 5px 10px; background: #eee; border-radius: 15px; font-size: 0.8em; color: #777; }
        .step-badge.active { background: #27ae60; color: white; font-weight: bold; }

        /* Dinamik Alan */
        #dynamic-content { flex: 1; overflow-y: auto; padding-right: 10px; font-size: 1.1em; line-height: 1.6; }
        
        /* Galeri Stilleri */
        .image-gallery { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .image-gallery img { height: 300px; border-radius: 8px; border: 1px solid #ddd; object-fit: cover; }
        
        /* Örnekler Kutusu */
        .example-box { background: #e8f6f3; border-left: 5px solid #1abc9c; padding: 15px; margin: 10px 0; border-radius: 4px; }

        /* Çizim */
        #drawing-canvas { border: 2px dashed #555; background: #fff; touch-action: none; display: block; margin: 0 auto; max-width: 100%; }
        
        /* Quiz */
        .quiz-q { margin-bottom: 15px; background: #f8f9fa; pading: 10px; border-radius: 5px; }
        .quiz-opt { display: block; width: 100%; padding: 10px; margin: 5px 0; background: white; border: 1px solid #ccc; text-align: left; cursor: pointer; }
        .quiz-opt.correct { background: #d4edda; }
        .quiz-opt.wrong { background: #f8d7da; }

        /* Butonlar */
        #controls { margin-top: 15px; display: flex; justify-content: space-between; padding-top: 10px; border-top: 1px solid #eee; }
        .btn { padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; }
        .btn-next { background: #2980b9; color: white; }
        .btn-prev { background: #95a5a6; color: white; }
        .btn:disabled { opacity: 0.5; }

        .section-note { font-size: 0.9em; color: #666; margin-bottom: 10px; font-style: italic; display: block; }
    </style>
</head>
<body>

    <a-scene embedded>
        <a-entity light="type: ambient; color: #CCC"></a-entity>
        <a-box position="0 2 -5" width="15" height="8" depth="0.1" color="#e0e0e0"></a-box>
        <a-plane position="0 0 -2" rotation="-90 0 0" width="15" height="15" color="#a1887f"></a-plane>
        <a-entity position="0 1.6 2"><a-camera look-controls="enabled: false"></a-camera></a-entity>
    </a-scene>

    <div id="ui-layer">
        <div id="smart-board">
            <div id="sidebar">
                <div id="user-info">
                    <h3>Öğrenci Paneli</h3>
                    <div id="score-display">0 Puan</div>
                </div>
                <div id="menu-container"></div>
            </div>

            <div id="content-area">
                <div id="lesson-header">
                    <h2 id="lesson-title">Ders Seçimi</h2>
                    <div id="progress-steps">
                        <span class="step-badge" id="s-0">Konu</span>
                        <span class="step-badge" id="s-1">Görsel</span>
                        <span class="step-badge" id="s-2">Video</span>
                        <span class="step-badge" id="s-3">Örnekler</span>
                        <span class="step-badge" id="s-4">Etkinlik</span>
                        <span class="step-badge" id="s-5">Sınav</span>
                    </div>
                </div>
                <div id="dynamic-content">
                    <p style="text-align:center; margin-top:50px;">Lütfen sol menüden bir ders seçin.</p>
                </div>
                <div id="controls">
                    <button class="btn btn-prev" id="btn-prev" onclick="changeStep(-1)" disabled>Geri</button>
                    <button class="btn btn-next" id="btn-next" onclick="changeStep(1)" disabled>İleri</button>
                </div>
            </div>
        </div>
    </div>

    <script>
// --- DEĞİŞKENLER ---
    let userScore = parseInt(localStorage.getItem('v3_score')) || 0;
    let completed = JSON.parse(localStorage.getItem('v3_completed')) || [];
    
    let currentLesson = null;
    let step = 0;
    let synth = window.speechSynthesis;
    let drawCtx = null;
    let isDrawing = false;

    window.onload = () => { 
        renderMenu(); 
        updateScore(); 
        if(typeof curriculumData === 'undefined') {
            alert("HATA: icerik.js dosyası bulunamadı! İki dosya aynı klasörde olmalı.");
        }
    };

    function updateScore() { document.getElementById('score-display').innerText = userScore + " Puan"; }

    // --- MENÜ ---
    function renderMenu() {
        const container = document.getElementById('menu-container');
        container.innerHTML = "";
        
        // Eğer curriculumData boşsa hata vermesin
        if(!curriculumData) return;

        curriculumData.forEach(subject => {
            let btn = document.createElement('button');
            btn.className = 'main-subject';
            btn.innerText = subject.subject;
            btn.onclick = function() { 
                let next = this.nextElementSibling; 
                next.style.display = next.style.display === 'none' ? 'block' : 'none'; 
            };
            container.appendChild(btn);

            let panel = document.createElement('div');
            panel.style.display = 'none';
            subject.lessons.forEach(l => {
                let sub = document.createElement('button');
                sub.className = 'sub-topic';
                sub.innerText = l.title;
                if(completed.includes(l.id)) {
                    sub.classList.add('completed');
                    sub.innerText += " (Tamamlandı)"; // Kullanıcı bittiğini görsün
                }
                sub.onclick = () => startLesson(l, sub);
                panel.appendChild(sub);
            });
            container.appendChild(panel);
        });
    }

    function startLesson(lesson, btn) {
        document.querySelectorAll('.sub-topic').forEach(b => b.classList.remove('active-lesson'));
        btn.classList.add('active-lesson');
        currentLesson = lesson;
        step = 0;
        
        // DERS TEKRAR MODU KONTROLÜ
        // Tamamlanmış olsa bile açılmasına izin veriyoruz.
        renderStep();
    }

    function changeStep(dir) {
        step += dir;
        renderStep();
    }

    // --- İÇERİK GÖSTERİMİ ---
    function renderStep() {
        const content = document.getElementById('dynamic-content');
        document.getElementById('lesson-title').innerText = currentLesson.title;
        
        // Adım Göstergeleri
        for(let i=0; i<=5; i++) {
            let el = document.getElementById(`s-${i}`);
            if(el) {
                if(i === step) el.classList.add('active');
                else el.classList.remove('active');
            }
        }

        // Buton Kontrolü
        document.getElementById('btn-prev').disabled = step === 0;
        let nextBtn = document.getElementById('btn-next');
        
        // Son adımda buton metni
        if (step === 5) {
            if(completed.includes(currentLesson.id)) {
                nextBtn.innerText = "Dersi Kapat (Tekrar)";
            } else {
                nextBtn.innerText = "Dersi Bitir ve Puan Al";
            }
        } else {
            nextBtn.innerText = "İleri";
        }
        nextBtn.disabled = false;

        synth.cancel(); // Sesi durdur

        // İÇERİK SWITCH
        switch(step) {
            case 0: // METİN
                content.innerHTML = `<span class="section-note">Ders Notları:</span>
                                     <div style="font-size:1.3em; padding:10px;">${currentLesson.content.text}</div>`;
                // iPad'de otomatik okuma bazen tıklama gerektirir, o yüzden hata vermemesi için try-catch
                try {
                    let u = new SpeechSynthesisUtterance(currentLesson.content.text);
                    u.lang = 'tr-TR';
                    synth.speak(u);
                } catch(e) { console.log("Ses hatası", e); }
                break;

            case 1: // RESİMLER
                let imgs = currentLesson.content.images;
                let imgHtml = `<span class="section-note">Görseller (Kaydırılabilir):</span><div class="image-gallery">`;
                if(imgs && imgs.length > 0) {
                    // Hata olursa gri kutu gösteren kod eklendi (onerror)
                    imgs.forEach(url => { 
                        imgHtml += `<img src="${url}" onerror="this.src='https://placehold.co/600x400?text=Resim+Yuklenemedi'">`; 
                    });
                } else {
                    imgHtml += `<p>Bu ders için görsel bulunamadı.</p>`;
                }
                imgHtml += `</div>`;
                content.innerHTML = imgHtml;
                break;

            case 2: // VİDEO
                content.innerHTML = `<span class="section-note">Video Anlatım:</span>`;
                if(currentLesson.content.video && currentLesson.content.video.length > 5) {
                    content.innerHTML += `<iframe src="${currentLesson.content.video}" style="width:100%; height:350px; border:none; border-radius:8px;" allowfullscreen></iframe>`;
                } else {
                    // Video yoksa veya link bozuksa
                    content.innerHTML += `<div class="error-msg">Bu dersin videosu henüz yüklenmedi.<br>Örnek video için: <a href="https://www.youtube.com" target="_blank">Youtube</a></div>`;
                }
                break;

            case 3: // ÖRNEKLER
                let exHtml = `<span class="section-note">Örnekler:</span>`;
                if(currentLesson.content.examples && currentLesson.content.examples.length > 0) {
                    currentLesson.content.examples.forEach(ex => {
                        exHtml += `<div class="example-box">${ex}</div>`;
                    });
                } else {
                    exHtml += `<p>Örnek bulunmamaktadır.</p>`;
                }
                content.innerHTML = exHtml;
                break;

            case 4: // ETKİNLİK
                content.innerHTML = `<span class="section-note">Etkinlik:</span>
                    <p><strong>${currentLesson.content.activityText}</strong></p>
                    <canvas id="drawing-canvas" width="600" height="300"></canvas>
                    <div style="text-align:center; margin-top:5px;"><button onclick="clearCanvas()">Temizle</button></div>`;
                setTimeout(setupCanvas, 100); // Canvas yüklenmesi için milisaniyelik gecikme
                break;

            case 5: // SINAV
                let qHtml = `<span class="section-note">Sınav:</span>`;
                if(currentLesson.content.quiz && currentLesson.content.quiz.length > 0) {
                    currentLesson.content.quiz.forEach((q, i) => {
                        qHtml += `<div class="quiz-q"><p><strong>${i+1}. ${q.q}</strong></p>`;
                        q.opts.forEach((opt, oIdx) => {
                            qHtml += `<button class="quiz-opt" onclick="checkAnswer(this, ${oIdx}, ${q.ans})">${opt}</button>`;
                        });
                        qHtml += `</div>`;
                    });
                } else {
                     qHtml += "<p>Bu dersin sınavı yok. Bitirmek için butona basın.</p>";
                }
                content.innerHTML = qHtml;
                nextBtn.onclick = finishLesson;
                break;
        }
    }

    // --- CANVAS (iPAD İÇİN GÜNCELLENMİŞ) ---
    function setupCanvas() {
        const canvas = document.getElementById('drawing-canvas');
        if(!canvas) return;
        
        drawCtx = canvas.getContext('2d');
        drawCtx.lineWidth = 3; drawCtx.strokeStyle = "#000"; drawCtx.lineCap = "round";

        // Mouse
        canvas.onmousedown = startDraw;
        canvas.onmousemove = draw;
        canvas.onmouseup = stopDraw;
        
        // Touch (iPad Fix - addEventListener kullanımı daha sağlıklı)
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Sayfa kaymasını engelle
            startDraw(e.touches[0]);
        }, {passive: false});

        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            draw(e.touches[0]);
        }, {passive: false});

        canvas.addEventListener('touchend', stopDraw);
    }

    function startDraw(e) { 
        isDrawing = true; 
        draw(e); 
    }
    function stopDraw() { 
        isDrawing = false; 
        drawCtx.beginPath(); 
    }
    function draw(e) {
        if(!isDrawing) return;
        const canvas = document.getElementById('drawing-canvas');
        const rect = canvas.getBoundingClientRect();
        
        // Hem mouse hem touch koordinatlarını yakala
        const clientX = e.clientX;
        const clientY = e.clientY;

        const x = clientX - rect.left;
        const y = clientY - rect.top;
        
        drawCtx.lineTo(x, y);
        drawCtx.stroke();
        drawCtx.beginPath();
        drawCtx.moveTo(x, y);
    }
    function clearCanvas() { 
        const c = document.getElementById('drawing-canvas'); 
        c.getContext('2d').clearRect(0, 0, c.width, c.height); 
    }

    // --- SINAV ---
    window.checkAnswer = function(btn, sel, cor) {
        let p = btn.parentElement;
        let btns = p.getElementsByClassName('quiz-opt');
        for(let b of btns) b.disabled = true; 
        if(sel === cor) btn.classList.add('correct');
        else btn.classList.add('wrong');
    }

    function finishLesson() {
        if(!completed.includes(currentLesson.id)) {
            userScore += currentLesson.points;
            completed.push(currentLesson.id);
            localStorage.setItem('v3_score', userScore);
            localStorage.setItem('v3_completed', JSON.stringify(completed));
            updateScore();
            alert("Tebrikler! Puan eklendi.");
        } else {
            // Tekrar modu mesajı
            alert("Ders tekrarlandı. (Puan daha önce alınmıştı)");
        }
        renderMenu();
        // İlk adıma geri dönme
        step = 0;
        renderStep();
    }
    </script>
</body>
</html>
