<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Yolculuğu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #87CEEB 0%, #98FB98 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
        }
        
        .speech-bubble {
            position: absolute;
            background: white;
            border: 3px solid #333;
            border-radius: 20px;
            padding: 15px 20px;
            font-size: 16px;
            color: #333;
            max-width: 300px;
            z-index: 200;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s ease;
        }
        
        .speech-bubble.show {
            opacity: 1;
            transform: scale(1);
        }
        
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 30px;
            width: 0;
            height: 0;
            border: 15px solid transparent;
            border-top-color: white;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
            text-align: center;
        }
        
        .control-btn {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .control-btn:hover {
            background: #45a049;
        }
        
        #mobileControls {
            position: absolute;
            bottom: 80px;
            right: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 5px;
            width: 150px;
            height: 150px;
        }
        
        .mobile-btn {
            background: rgba(0,0,0,0.7);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            width: 50px;
            height: 50px;
        }
        
        .mobile-btn:active {
            background: rgba(255,255,255,0.3);
        }
        
        .mobile-btn:nth-child(1) { grid-column: 2; grid-row: 1; } /* Yukarı */
        .mobile-btn:nth-child(2) { grid-column: 1; grid-row: 2; } /* Sol */
        .mobile-btn:nth-child(3) { grid-column: 3; grid-row: 2; } /* Sağ */
        .mobile-btn:nth-child(4) { grid-column: 2; grid-row: 3; } /* Aşağı */
        
        @media (min-width: 768px) {
            #mobileControls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <div>🎒 Öğrenci Yolculuğu</div>
            <div>Puan: <span id="score">0</span></div>
            <div>Karakter: <span id="characterName">Seçilmedi</span></div>
        </div>
        
        <div id="speechBubble" class="speech-bubble"></div>
        
        <div id="controls">
            <div>Hareket: WASD veya Mobil Butonlar</div>
            <button class="control-btn" onclick="selectCharacter('male')">👦 Erkek</button>
            <button class="control-btn" onclick="selectCharacter('female')">👧 Kız</button>
            <button class="control-btn" onclick="toggleSound()">🔊 Ses</button>
        </div>
        
        <div id="mobileControls">
            <div class="mobile-btn" ontouchstart="move('up')">⬆</div>
            <div class="mobile-btn" ontouchstart="move('left')">⬅</div>
            <div class="mobile-btn" ontouchstart="move('right')">➡</div>
            <div class="mobile-btn" ontouchstart="move('down')">⬇</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r164/three.min.js"></script>
    <script>
        // Oyun değişkenleri
        let scene, camera, renderer;
        let player, house, school, teacher;
        let gameStarted = false;
        let playerPos = { x: 0, z: 0 };
        let selectedCharacter = null;
        let score = 0;
        let soundEnabled = true;
        let audioContext;
        let schoolVisited = false;
        
        // Ses sistemi
        function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {
                console.log('Ses desteklenmiyor');
            }
        }
        
        function playSound(freq, duration) {
            if (!audioContext || !soundEnabled) return;
            
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            osc.start();
            osc.stop(audioContext.currentTime + duration);
        }
        
        // Oyun başlatma
        function init() {
            console.log('Oyun başlatılıyor...');
            
            // Sahne
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            
            // Kamera
            camera = new THREE.OrthographicCamera(
                window.innerWidth / -100,
                window.innerWidth / 100,
                window.innerHeight / 100,
                window.innerHeight / -100,
                1, 1000
            );
            camera.position.set(10, 10, 10);
            camera.lookAt(0, 0, 0);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('gameContainer').appendChild(renderer.domElement);
            
            // Işık
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 10, 5);
            light.castShadow = true;
            scene.add(light);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            createWorld();
            setupControls();
            initAudio();
            animate();
            
            // Hoşgeldin mesajı
            showMessage("Merhaba! Oyunumuza hoşgeldiniz! 👋<br>Önce bir karakter seçin!");
            
            console.log('Oyun başarıyla yüklendi!');
        }
        
        function createWorld() {
            // Zemin
            const groundGeometry = new THREE.PlaneGeometry(50, 50);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x90EE90 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Ev
            createHouse();
            
            // Okul
            createSchool();
            
            // Öğretmen
            createTeacher();
            
            // Ağaçlar
            createTrees();
        }
        
        function createHouse() {
            const houseGroup = new THREE.Group();
            
            // Ana yapı
            const houseBody = new THREE.Mesh(
                new THREE.BoxGeometry(4, 3, 4),
                new THREE.MeshLambertMaterial({ color: 0xDEB887 })
            );
            houseBody.position.y = 1.5;
            houseBody.castShadow = true;
            houseGroup.add(houseBody);
            
            // Çatı
            const roof = new THREE.Mesh(
                new THREE.ConeGeometry(3, 1.5, 4),
                new THREE.MeshLambertMaterial({ color: 0x8B4513 })
            );
            roof.position.y = 3.75;
            roof.rotation.y = Math.PI / 4;
            roof.castShadow = true;
            houseGroup.add(roof);
            
            // Kapı
            const door = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 2, 0.1),
                new THREE.MeshLambertMaterial({ color: 0x654321 })
            );
            door.position.set(0, 1, 2.05);
            houseGroup.add(door);
            
            houseGroup.position.set(-15, 0, -10);
            scene.add(houseGroup);
            house = houseGroup;
        }
        
        function createSchool() {
            const schoolGroup = new THREE.Group();
            
            // Ana bina
            const schoolBody = new THREE.Mesh(
                new THREE.BoxGeometry(8, 4, 6),
                new THREE.MeshLambertMaterial({ color: 0xDC143C })
            );
            schoolBody.position.y = 2;
            schoolBody.castShadow = true;
            schoolGroup.add(schoolBody);
            
            // Çatı
            const roof = new THREE.Mesh(
                new THREE.BoxGeometry(9, 0.5, 7),
                new THREE.MeshLambertMaterial({ color: 0x4B0082 })
            );
            roof.position.y = 4.25;
            roof.castShadow = true;
            schoolGroup.add(roof);
            
            schoolGroup.position.set(15, 0, 10);
            scene.add(schoolGroup);
            school = schoolGroup;
        }
        
        function createTeacher() {
            const teacherGroup = new THREE.Group();
            
            // Vücut
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.4, 1.2),
                new THREE.MeshLambertMaterial({ color: 0x4169E1 })
            );
            body.position.y = 0.6;
            body.castShadow = true;
            teacherGroup.add(body);
            
            // Kafa
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.25),
                new THREE.MeshLambertMaterial({ color: 0xFFDBB3 })
            );
            head.position.y = 1.45;
            head.castShadow = true;
            teacherGroup.add(head);
            
            teacherGroup.position.set(12, 0.5, 8);
            scene.add(teacherGroup);
            teacher = teacherGroup;
        }
        
        function createTrees() {
            for (let i = 0; i < 8; i++) {
                const treeGroup = new THREE.Group();
                
                // Gövde
                const trunk = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.2, 0.3, 2),
                    new THREE.MeshLambertMaterial({ color: 0x8B4513 })
                );
                trunk.position.y = 1;
                trunk.castShadow = true;
                treeGroup.add(trunk);
                
                // Yaprak
                const leaves = new THREE.Mesh(
                    new THREE.SphereGeometry(1),
                    new THREE.MeshLambertMaterial({ color: 0x228B22 })
                );
                leaves.position.y = 2.5;
                leaves.castShadow = true;
                treeGroup.add(leaves);
                
                const angle = (i / 8) * Math.PI * 2;
                const radius = 20;
                treeGroup.position.set(
                    Math.cos(angle) * radius,
                    0,
                    Math.sin(angle) * radius
                );
                
                scene.add(treeGroup);
            }
        }
        
        function createPlayer(gender) {
            if (player) {
                scene.remove(player);
            }
            
            const playerGroup = new THREE.Group();
            
            // Renk seçimi
            const colors = {
                male: { shirt: 0x4169E1, shorts: 0x8B4513, hat: 0xFF6B6B },
                female: { shirt: 0xFF69B4, shorts: 0x9932CC, hat: 0xFFD700 }
            };
            
            const colorScheme = colors[gender];
            
            // Vücut
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.4, 1.2),
                new THREE.MeshLambertMaterial({ color: colorScheme.shirt })
            );
            body.position.y = 0.6;
            body.castShadow = true;
            playerGroup.add(body);
            
            // Kafa
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.25),
                new THREE.MeshLambertMaterial({ color: 0xFFDBB3 })
            );
            head.position.y = 1.45;
            head.castShadow = true;
            playerGroup.add(head);
            
            // Şapka
            const hat = new THREE.Mesh(
                new THREE.CylinderGeometry(0.28, 0.28, 0.12),
                new THREE.MeshLambertMaterial({ color: colorScheme.hat })
            );
            hat.position.y = 1.65;
            hat.castShadow = true;
            playerGroup.add(hat);
            
            // Şort
            const shorts = new THREE.Mesh(
                new THREE.CylinderGeometry(0.35, 0.35, 0.6),
                new THREE.MeshLambertMaterial({ color: colorScheme.shorts })
            );
            shorts.position.y = -0.1;
            shorts.castShadow = true;
            playerGroup.add(shorts);
            
            // Çanta
            const backpack = new THREE.Mesh(
                new THREE.BoxGeometry(0.4, 0.5, 0.2),
                new THREE.MeshLambertMaterial({ color: 0x228B22 })
            );
            backpack.position.set(0, 0.8, -0.3);
            backpack.castShadow = true;
            playerGroup.add(backpack);
            
            playerGroup.position.set(0, 0.5, 0);
            scene.add(playerGroup);
            player = playerGroup;
            
            return playerGroup;
        }
        
        // Kontroller
        function setupControls() {
            document.addEventListener('keydown', (event) => {
                if (!player) return;
                
                const moveDistance = 0.5;
                let moved = false;
                
                switch(event.key.toLowerCase()) {
                    case 'w':
                    case 'arrowup':
                        playerPos.z += moveDistance;
                        moved = true;
                        break;
                    case 's':
                    case 'arrowdown':
                        playerPos.z -= moveDistance;
                        moved = true;
                        break;
                    case 'a':
                    case 'arrowleft':
                        playerPos.x -= moveDistance;
                        moved = true;
                        break;
                    case 'd':
                    case 'arrowright':
                        playerPos.x += moveDistance;
                        moved = true;
                        break;
                    case 'e':
                        checkInteractions();
                        break;
                }
                
                if (moved) {
                    // Sınır kontrolü
                    playerPos.x = Math.max(-20, Math.min(20, playerPos.x));
                    playerPos.z = Math.max(-20, Math.min(20, playerPos.z));
                    
                    player.position.x = playerPos.x;
                    player.position.z = playerPos.z;
                    
                    // Kamera takibi
                    camera.position.x = playerPos.x + 10;
                    camera.position.z = playerPos.z + 10;
                    camera.lookAt(playerPos.x, 0, playerPos.z);
                    
                    playSound(300, 0.1);
                    checkQuests();
                }
            });
            
            // Mobil kontroller için touch event'leri
            document.querySelectorAll('.mobile-btn').forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const direction = btn.textContent.includes('⬆') ? 'up' : 
                                     btn.textContent.includes('⬇') ? 'down' : 
                                     btn.textContent.includes('⬅') ? 'left' : 'right';
                    move(direction);
                });
            });
        }
        
        // Mobil kontroller
        function move(direction) {
            if (!player) return;
            
            const moveDistance = 0.5;
            
            switch(direction) {
                case 'up':
                    playerPos.z += moveDistance;
                    break;
                case 'down':
                    playerPos.z -= moveDistance;
                    break;
                case 'left':
                    playerPos.x -= moveDistance;
                    break;
                case 'right':
                    playerPos.x += moveDistance;
                    break;
            }
            
            // Sınır kontrolü
            playerPos.x = Math.max(-20, Math.min(20, playerPos.x));
            playerPos.z = Math.max(-20, Math.min(20, playerPos.z));
            
            player.position.x = playerPos.x;
            player.position.z = playerPos.z;
            
            // Kamera takibi
            camera.position.x = playerPos.x + 10;
            camera.position.z = playerPos.z + 10;
            camera.lookAt(playerPos.x, 0, playerPos.z);
            
            playSound(300, 0.1);
            checkQuests();
        }
        
        // Karakter seçimi
        function selectCharacter(gender) {
            selectedCharacter = gender;
            createPlayer(gender);
            playerPos = { x: 0, z: 0 };
            player.position.set(0, 0.5, 0);
            
            const name = gender === 'male' ? 'Ahmet' : 'Ayşe';
            document.getElementById('characterName').textContent = name;
            
            showMessage(`Merhaba ${name}! Şimdi okula doğru yürümeye başla! 🏫<br>WASD tuşları ile hareket et!`);
            playSound(500, 0.3);
            
            gameStarted = true;
        }
        
        // Görev kontrolleri
        function checkQuests() {
            // Okula yaklaşma
            if (!schoolVisited) {
                const schoolDistance = Math.sqrt(
                    Math.pow(playerPos.x - 15, 2) + 
                    Math.pow(playerPos.z - 10, 2)
                );
                
                if (schoolDistance < 5) {
                    schoolVisited = true;
                    score += 50;
                    document.getElementById('score').textContent = score;
                    showMessage("Harika! Okula vardın! 🎉<br>+50 puan kazandın!");
                    playSound(800, 0.5);
                }
            }
            
            // Öğretmene yaklaşma
            const teacherDistance = Math.sqrt(
                Math.pow(playerPos.x - 12, 2) + 
                Math.pow(playerPos.z - 8, 2)
            );
            
            if (teacherDistance < 3) {
                showMessage("Öğretmen: 'Merhaba! Derse hoşgeldin!' 👨‍🏫<br>E tuşuna bas!");
            }
        }
        
        // Etkileşimler
        function checkInteractions() {
            const teacherDistance = Math.sqrt(
                Math.pow(playerPos.x - 12, 2) + 
                Math.pow(playerPos.z - 8, 2)
            );
            
            if (teacherDistance < 3) {
                score += 30;
                document.getElementById('score').textContent = score;
                showMessage("Öğretmen: 'Çok iyi! Derse katıldın!' 📚<br>+30 puan kazandın!");
                playSound(600, 0.4);
            }
        }
        
        // Mesaj gösterme
        function showMessage(text) {
            const bubble = document.getElementById('speechBubble');
            bubble.innerHTML = text;
            bubble.style.left = '50%';
            bubble.style.top = '30%';
            bubble.style.transform = 'translateX(-50%)';
            bubble.classList.add('show');
            
            setTimeout(() => {
                bubble.classList.remove('show');
            }, 4000);
        }
        
        // Ses açma/kapama
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = event.target;
            btn.textContent = soundEnabled ? '🔊 Ses' : '🔇 Ses';
            playSound(400, 0.2);
        }
        
        // Animasyon döngüsü
        function animate() {
            requestAnimationFrame(animate);
            
            // Karakter animasyonu
            if (player) {
                player.position.y = 0.5 + Math.sin(Date.now() * 0.01) * 0.05;
            }
            
            // Öğretmen animasyonu
            if (teacher) {
                teacher.position.y = 0.5 + Math.sin(Date.now() * 0.005) * 0.03;
            }
            
            renderer.render(scene, camera);
        }
        
        // Pencere boyutu değişimi
        window.addEventListener('resize', onWindowResize);
        
        function onWindowResize() {
            camera.left = window.innerWidth / -100;
            camera.right = window.innerWidth / 100;
            camera.top = window.innerHeight / 100;
            camera.bottom = window.innerHeight / -100;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Touch event'leri için
        document.addEventListener('touchstart', function(e) {
            e.preventDefault();
        }, { passive: false });
        
        // Oyunu başlat
        window.addEventListener('load', function() {
            try {
                init();
            } catch (error) {
                console.error('Oyun yüklenirken hata:', error);
                alert('Oyun yüklenirken hata oluştu. Sayfayı yenileyin.');
            }
        });
    </script>
</body>
</html>
