<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tekno Panel</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  background:#0f172a;
  color:white;
}

#sidebar {
  width:220px;
  background:#020617;
  padding:15px;
}

#content {
  flex:1;
  padding:20px;
}

button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  cursor:pointer;
  background:#1e293b;
  color:white;
}

.card {
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.parts {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.part {
  background:#334155;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  flex:1;
  min-width:120px;
  text-align:center;
  transition:0.2s;
}

.part:hover {
  background:#475569;
}

.bar {
  height:10px;
  background:#334155;
  border-radius:5px;
  margin:5px 0;
}

.fill {
  height:10px;
  background:#22c55e;
  border-radius:5px;
}
</style>
</head>

<body>

<div id="sidebar">
  <h3>Menü</h3>
  <button onclick="loadPage('career')">Kariyer</button>
  <button onclick="loadPage('project')">Projeler</button>
</div>

<div id="content"></div>

<script src="main.js"></script>
</body>
</html>
