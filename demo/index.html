<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanal Verse</title>
    <style>
        /* GENEL AYARLAR VE TASARIM (CSS) */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2b2075 0%, #4facfe 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .phone-container {
            width: 360px;
            height: 740px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Sahne Yönetimi */
        .scene {
            display: none; /* Varsayılan olarak gizli */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .scene.active {
            display: flex; /* Sadece aktif sahne görünür */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LOGO ALANI */
        .logo-area {
            margin-bottom: 40px;
        }
        .logo-text {
            font-size: 40px;
            font-weight: 800;
            line-height: 1;
            text-transform: uppercase;
        }

        /* BUTONLAR VE INPUTLAR */
        .btn {
            background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px 0;
            width: 80%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
        }

        input[type="text"] {
            width: 80%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            margin-bottom: 20px;
            font-size: 16px;
            text-align: center;
        }

        /* SAHNE 2: Cinsiyet/Rol Seçimi */
        .role-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .role-option {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .role-option input {
            margin-right: 10px;
            width: 20px;
            height: 20px;
        }

        /* SAHNE 3: Avatar */
        .avatar-display {
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
        }

        .avatar-controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .gender-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
            background: transparent;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .gender-btn.selected {
            background: white;
            color: #2b2075;
        }

        /* SAHNE 4: Dashboard Menü */
        .menu-grid {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 50px;
        }

        .menu-item {
            background: rgba(255,255,255,0.9);
            color: #333;
            width: 90px;
            height: 100px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .menu-item:hover {
            transform: translateY(-5px);
        }
        .menu-icon {
            font-size: 30px;
            margin-bottom: 5px;
        }
        .menu-text {
            font-size: 12px;
            font-weight: bold;
        }

        /* SAHNE 5: Harita */
        .map-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: #4facfe;
            border-radius: 28px;
            overflow: hidden;
        }

        .map-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Harita üzerindeki etkileşimli noktalar (Temsili) */
        .map-hotspot {
            position: absolute;
            background: rgba(255, 255, 0, 0.3); /* Görünmez yapmak için opacity: 0 yapın */
            border-radius: 50%;
            cursor: pointer;
            border: 2px dashed yellow;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 10px;
            cursor: pointer;
            z-index: 10;
        }

    </style>
</head>
<body>

<div class="phone-container">

    <div id="scene-start" class="scene active">
        <div class="logo-area">
            <div class="logo-text">SANAL<br>VERSE</div>
        </div>
        <img src="IMG_1388.jpeg" style="width: 200px; border-radius: 20px; margin-bottom: 20px; opacity: 0.8; display:none;" alt="Arkaplan"> 
        <button class="btn" onclick="goToScene('scene-login')">OYUNA BAŞLA</button>
        <button class="btn btn-secondary" onclick="goToScene('scene-login')">AYARLAR</button>
    </div>

    <div id="scene-login" class="scene">
        <div class="logo-area">
            <div class="logo-text" style="font-size: 30px;">SANAL<br>VERSE</div>
        </div>
        
        <input type="text" id="username" placeholder="İsminiz">
        
        <div class="role-selector">
            <label class="role-option">
                <input type="radio" name="role" value="yetiskin" checked> Yetişkin
            </label>
            <label class="role-option">
                <input type="radio" name="role" value="cocuk"> Çocuk
            </label>
        </div>

        <button class="btn" onclick="validateAndGo('scene-avatar')">GİRİŞ</button>
    </div>

    <div id="scene-avatar" class="scene">
        <h2 style="margin-bottom: 30px;">AVATAR SEÇ</h2>
        
        <div class="avatar-display">
            <span id="avatar-icon">👨</span>
        </div>
        
        <div class="avatar-controls">
            <button class="gender-btn selected" onclick="selectGender('male', this)">♂</button>
            <button class="gender-btn" onclick="selectGender('female', this)">♀</button>
        </div>

        <br><br>
        <button class="btn" onclick="goToScene('scene-dashboard')">DEVAM</button>
    </div>

    <div id="scene-dashboard" class="scene">
        <h2 style="margin-bottom: 10px;">HOŞGELDİN</h2>
        <h3 id="display-name" style="margin-top: 0; color: #a8c0ff;">Oyuncu</h3>
        
        <div style="flex-grow: 1; display: flex; align-items: center;">
             <h1 style="font-size: 36px;">SEYAHAT ET</h1>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="goToScene('scene-map')">
                <div class="menu-icon">✈️</div>
                <div class="menu-text">SEYAHAT ET</div>
            </div>
            <div class="menu-item" onclick="alert('Evim özelliği yapım aşamasında!')">
                <div class="menu-icon">🏠</div>
                <div class="menu-text">EVİM</div>
            </div>
            <div class="menu-item" onclick="alert('Açık Odalar yakında!')">
                <div class="menu-icon">🚪</div>
                <div class="menu-text">AÇIK ODALAR</div>
            </div>
        </div>
        <div style="height: 50px;"></div>
    </div>

    <div id="scene-map" class="scene" style="padding: 0;">
        <div class="map-container">
            <button class="back-btn" onclick="goToScene('scene-dashboard')">← Geri</button>
            
            <img src="IMG_1392.jpg" class="map-image" alt="Şehir Haritası">

            <div class="map-hotspot" style="top: 20%; left: 15%; width: 80px; height: 80px;" onclick="enterBuilding('Okul')"></div>
            <div class="map-hotspot" style="top: 20%; right: 15%; width: 80px; height: 60px;" onclick="enterBuilding('Cafe')"></div>
            <div class="map-hotspot" style="bottom: 15%; left: 35%; width: 60px; height: 60px;" onclick="enterBuilding('Ev')"></div>
            <div class="map-hotspot" style="bottom: 25%; right: 15%; width: 70px; height: 80px;" onclick="enterBuilding('İş Yeri')"></div>
        </div>
    </div>

</div>

<script>
    // Kullanıcı verilerini tutacak değişkenler
    let userData = {
        name: "",
        role: "yetiskin",
        gender: "male"
    };

    // Sahne Değiştirme Fonksiyonu
    function goToScene(sceneId) {
        // Tüm sahneleri gizle
        document.querySelectorAll('.scene').forEach(scene => {
            scene.classList.remove('active');
        });
        // İstenen sahneyi göster
        document.getElementById(sceneId).classList.add('active');
    }

    // Giriş Kontrolü
    function validateAndGo(nextScene) {
        const nameInput = document.getElementById('username').value;
        if(nameInput.trim() === "") {
            alert("Lütfen bir isim giriniz!");
            return;
        }
        
        userData.name = nameInput;
        
        // Radyo butonundan rolü al
        const roles = document.getElementsByName('role');
        for(let role of roles) {
            if(role.checked) userData.role = role.value;
        }

        // İsmi dashboard'a yazdır
        document.getElementById('display-name').innerText = userData.name;
        
        goToScene(nextScene);
    }

    // Cinsiyet Seçimi
    function selectGender(gender, btnElement) {
        userData.gender = gender;
        
        // Buton görünümlerini güncelle
        document.querySelectorAll('.gender-btn').forEach(btn => btn.classList.remove('selected'));
        btnElement.classList.add('selected');

        // Avatar simgesini güncelle (Basit bir emoji değişimi)
        const avatarIcon = document.getElementById('avatar-icon');
        if(gender === 'male') {
            avatarIcon.innerText = "👨";
        } else {
            avatarIcon.innerText = "👩";
        }
    }

    // Bina Tıklama Simülasyonu
    function enterBuilding(buildingName) {
        alert(userData.name + " (" + userData.role + ") olarak " + buildingName + " binasına giriş yapıyorsunuz...");
        // İleride buraya bina içi sahne kodu eklenebilir
    }

</script>

</body>
</html>
