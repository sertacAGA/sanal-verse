<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanal Verse - Yatay Mod</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        
        <div id="scene-start" class="scene active">
            <div class="content-wrapper">
                <div class="logo-area">
                    <div class="logo-icon">🪐</div> <h1>SANAL<br>VERSE</h1>
                </div>
                <div class="button-group">
                    <button class="btn primary" onclick="goToScene('scene-login')">OYUNA BAŞLA</button>
                    <button class="btn secondary">AYARLAR</button>
                </div>
            </div>
        </div>

        <div id="scene-login" class="scene">
            <h2>KİMLİK OLUŞTUR</h2>
            <div class="login-form">
                <input type="text" id="username" placeholder="Kullanıcı Adı Giriniz" autocomplete="off">
                
                <div class="role-selection">
                    <label class="radio-card">
                        <input type="radio" name="role" value="Yetişkin" checked>
                        <span class="role-box">👨‍💼 Yetişkin</span>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="role" value="Çocuk">
                        <span class="role-box">🧒 Çocuk</span>
                    </label>
                </div>

                <button class="btn primary" onclick="validateAndGo('scene-avatar')">DEVAM ET</button>
            </div>
        </div>

        <div id="scene-avatar" class="scene">
            <h2>AVATARINI SEÇ</h2>
            
            <div class="avatar-wrapper">
                <button class="arrow-btn">❮</button>
                <div class="avatar-preview">
                    <div id="avatar-visual">🧔</div>
                </div>
                <button class="arrow-btn">❯</button>
            </div>

            <div class="gender-controls">
                <button class="gender-btn selected" onclick="selectGender('male', this)">ERKEK</button>
                <button class="gender-btn" onclick="selectGender('female', this)">KADIN</button>
            </div>

            <button class="btn primary" style="margin-top: 20px;" onclick="goToScene('scene-menu')">SEÇİMİ ONAYLA</button>
        </div>

        <div id="scene-menu" class="scene">
            <div class="menu-header">
                <h3>Hoşgeldin, <span id="display-name">Oyuncu</span></h3>
                <p>Nereye gitmek istersin?</p>
            </div>

            <div class="card-container">
                <div class="menu-card" onclick="goToScene('scene-map')">
                    <div class="card-icon">✈️</div>
                    <span>SEYAHAT ET</span>
                </div>
                <div class="menu-card" onclick="alert('Evim modülü yapım aşamasında.')">
                    <div class="card-icon">🏠</div>
                    <span>EVİM</span>
                </div>
                <div class="menu-card" onclick="alert('Açık odalar yakında.')">
                    <div class="card-icon">🚪</div>
                    <span>AÇIK ODALAR</span>
                </div>
            </div>
        </div>

        <div id="scene-map" class="scene full-screen">
            <img src="IMG_1392.jpg" alt="Şehir Haritası" class="map-bg">
            
            <button class="back-btn" onclick="goToScene('scene-menu')">🔙 MENÜYE DÖN</button>

            <div class="hotspot school" onclick="enterBuilding('Okul')">
                <span class="label">OKUL</span>
            </div>
            <div class="hotspot cafe" onclick="enterBuilding('Cafe')">
                <span class="label">CAFE</span>
            </div>
            <div class="hotspot home" onclick="enterBuilding('Ev')">
                <span class="label">EV</span>
            </div>
            <div class="hotspot work" onclick="enterBuilding('İş Yeri')">
                <span class="label">İŞ YERİ</span>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
